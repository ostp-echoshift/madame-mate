<?xml version="1.0" encoding="UTF-8" standalone="no"?>
   <svg  xmlns="http://www.w3.org/2000/svg"  viewBox="0 0 560 200" width="100%" height="100%"   preserveAspectRatio="xMidYMid meet" role="img">
      <title>Madame-MaTe Logotipo</title>
      
      <defs>
        <linearGradient id="metal_grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#FF55CC"/>
          <stop offset="100%" stop-color="#8844AA"/>
        </linearGradient>

        <linearGradient id="glass_shine" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
        </linearGradient>

        <filter id="shadow_soft" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#402040" flood-opacity="0.3"/>
        </filter>

        <mask id="sweep_mask">
          <rect width="560" height="200" fill="white"/>
          <rect x="-300" y="0" width="200" height="200" fill="black" style="transform: skewX(-20deg);">
            <animate attributeName="x" values="-300;600" dur="6s" repeatCount="indefinite" calcMode="linear"/>
          </rect>
        </mask>
      </defs>

      <rect width="560" height="200" fill="#FAF6EE"/>

      <circle cx="90" cy="100" r="80" fill="none" stroke="#DF73FF" stroke-width="2" opacity="0.2">
        <animate attributeName="r" values="80;85;80" dur="8s" repeatCount="indefinite"/>
      </circle>

      <g filter="url(#shadow_soft)">
        <circle cx="90" cy="100" r="68" fill="url(#metal_grad)"/>
        <path d="M 90 32 A 68 68 0 0 1 158 100" fill="none" stroke="url(#glass_shine)" stroke-width="15" stroke-linecap="round" opacity="0.6"/>
        
        <text x="90" y="120" font-family="Georgia, serif" font-size="72" font-weight="700"
              fill="#FAF6EE" text-anchor="middle" letter-spacing="-2" cursor="pointer"
              id="MONOGRAM_MM" style="user-select: none;">MM</text>
      </g>

      <g transform="translate(180, 15)">
        <text x="0" y="100" font-family="Georgia, serif" font-size="46" font-weight="400"
              fill="#4A0B5E" letter-spacing="3" filter="url(#shadow_soft)">Madame-MaTe</text>
        
        <text x="0" y="100" font-family="Georgia, serif" font-size="46" font-weight="400"
              fill="url(#metal_grad)" letter-spacing="3" mask="url(#sweep_mask)">Madame-MaTe</text>

        <text x="0" y="145" font-family="Verdana, sans-serif" font-size="16" font-weight="300"
              fill="#888" letter-spacing="8">ENSERES DEL HOGAR</text>
      </g>

      <script><![CDATA[
        const monogram = document.getElementById('MONOGRAM_MM');
        monogram.addEventListener('mouseover', () => {
          monogram.style.transition = "transform 0.5s ease-out";
          monogram.style.transform = "scale(1.05)";
        });
        monogram.addEventListener('mouseout', () => {
          monogram.style.transform = "scale(1)";
        });
      ]]></script>
</svg>
