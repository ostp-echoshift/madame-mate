<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" width="100%" height="100%" role="img" aria-label="Madame-MaTe - Enseres del Hogar">
  <title>Madame-MaTe Logotipo</title>
  <desc>Logotipo de la marca Madame-MaTe especializada en enseres del hogar con diseño metálico.</desc>

  <defs>
    <!-- Degradado metálico principal -->
    <linearGradient id="metal_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4703A"/>
      <stop offset="25%" stop-color="#F0A060"/>
      <stop offset="50%" stop-color="#9E3A1A"/>
      <stop offset="75%" stop-color="#C06030"/>
      <stop offset="100%" stop-color="#5A1A0A"/>
    </linearGradient>

    <!-- Degradado oscuro para líneas -->
    <linearGradient id="metal_dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B3218"/>
      <stop offset="50%" stop-color="#5A1A0A"/>
      <stop offset="100%" stop-color="#2A0A04"/>
    </linearGradient>

    <!-- Filtro de sombra suave -->
    <filter id="shadow_soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#2A0A04" flood-opacity="0.5"/>
    </filter>

    <!-- Filtro de brillo LED (simple y robusto) -->
    <filter id="led_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Efecto de barrido horizontal (usando rectángulo con opacidad animada) -->
    <mask id="sweep_mask">
      <rect width="560" height="200" fill="white"/>
      <rect x="-200" y="0" width="300" height="200" fill="black">
        <animate attributeName="x" values="-200;560" dur="4s" repeatCount="indefinite"/>
      </rect>
    </mask>
  </defs>

  <!-- Fondo claro -->
  <rect width="560" height="200" fill="#FAF6EE"/>

  <!-- Círculos exteriores (pulso cromático) -->
  <circle cx="90" cy="100" r="80" fill="none" stroke-width="12" filter="url(#led_glow)">
    <animate attributeName="stroke" 
      values="#8B3218;#D4703A;#F0A060;#D4703A;#8B3218"
      dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="90" cy="100" r="76" fill="none" stroke="#FAF6EE" stroke-width="2" opacity="0.5"/>

  <!-- Símbolo central MM -->
  <g filter="url(#shadow_soft)">
    <circle cx="90" cy="100" r="68" fill="url(#metal_grad)"/>
    
    <text x="90" y="120" font-family="'Times New Roman', Georgia, serif" font-size="72" font-weight="900"
          fill="#FAF6EE" text-anchor="middle" letter-spacing="-4" cursor="pointer"
          id="MONOGRAM_MM">MM</text>
    
    <line x1="56" y1="132" x2="124" y2="132" stroke="#FAF6EE" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Texto principal -->
  <g transform="translate(180, 15)">
    <text x="0" y="100" font-family="'Times New Roman', Georgia, serif" font-size="47" font-weight="400"
          fill="url(#metal_grad)" letter-spacing="5" filter="url(#shadow_soft)">Madame-MaTe</text>

    <!-- Capa de barrido sobre el texto (efecto brillo pasante) -->
    <text x="0" y="100" font-family="'Times New Roman', Georgia, serif" font-size="47" font-weight="400"
          fill="#FFE0B0" letter-spacing="5" opacity="0.6" mask="url(#sweep_mask)">Madame-MaTe</text>

    <!-- Tagline corregido -->
    <g transform="translate(5, 130)">
      <text x="0" y="12" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="18" font-weight="300"
            fill="#B898D0" letter-spacing="7">ENSERES DEL HOGAR</text>

      <!-- Joya decorativa (MM dentro de un elipse) reposicionada para que no se salga -->
      <g transform="translate(340, 0)" cursor="pointer">
        <ellipse cx="14" cy="12" rx="20" ry="7" fill="none" stroke-width="3" filter="url(#led_glow)">
          <animate attributeName="stroke" values="#8B3218;#D4703A;#F0A060;#D4703A;#8B3218" dur="4s" repeatCount="indefinite"/>
        </ellipse>
        <text x="14" y="20" font-family="'Times New Roman', Georgia, serif" font-size="12" font-weight="900"
              fill="#FAF6EE" text-anchor="middle" letter-spacing="-1">MM</text>
        <circle cx="14" cy="-4" r="3" fill="#FAF6EE" filter="url(#led_glow)"/>
      </g>
    </g>

    <!-- Línea divisoria -->
    <g transform="translate(0, 155)">
      <line x1="0" y1="0" x2="360" y2="0" stroke="url(#metal_dark)" stroke-width="1.5" filter="url(#shadow_soft)"/>
    </g>
  </g>

  <script>
  <![CDATA[
    const svgRoot = document.querySelector('svg');
    const monogram = document.getElementById('MONOGRAM_MM');

    // Onda expansiva al hacer clic en el monograma
    monogram.addEventListener('click', () => {
      const shockwave = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      shockwave.setAttribute("cx", "90");
      shockwave.setAttribute("cy", "100");
      shockwave.setAttribute("r", "68");
      shockwave.setAttribute("fill", "none");
      shockwave.setAttribute("stroke", "#D4703A");
      shockwave.setAttribute("stroke-width", "5");
      svgRoot.appendChild(shockwave);
      shockwave.animate([
        { r: 68, opacity: 1, strokeWidth: 5 },
        { r: 280, opacity: 0, strokeWidth: 1 }
      ], { duration: 600, easing: 'ease-out' }).onfinish = () => shockwave.remove();
    });

    // Efecto hover: escala suave y cambio de brillo
    monogram.addEventListener('mouseover', () => {
      monogram.style.transform = "scale(1.02)";
      monogram.style.transformOrigin = "90px 120px";
      monogram.style.transition = "transform 0.2s";
      monogram.style.filter = "drop-shadow(0 0 6px #F0A060)";
    });
    monogram.addEventListener('mouseout', () => {
      monogram.style.transform = "scale(1)";
      monogram.style.filter = "none";
    });
  ]]>
  </script>
</svg>